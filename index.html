<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Где Бензовоз</title>

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">

    <!-- Leaflet -->
    <link rel="stylesheet"
          href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>

<body>

<!-- Верхняя панель -->
<header class="top-bar">

    <div class="logo">
        🚛 Где Бензовоз
    </div>

</header>

<!-- Карта -->
<div id="map"></div>

<!-- Карточка заправки -->
<div id="stationInfo" class="station-card hidden">

    <button id="closeCard">✖</button>

    <h2 id="stationName">Название АЗС</h2>

    <p id="stationAddress">
        Адрес
    </p>

    <p id="stationHours">
        Время работы
    </p>

</div>

<!-- Загрузка -->
<div id="loading">

    <div class="loader"></div>

    <span>Загрузка карты...</span>

</div>

<!-- JS -->
<script src="script.js"></script>

</body>
</html>
